  - name: Creating the Mongo Repo
    copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo
  - name: Installing the Mongo DB
    package:
      name: mongodb-org
      state: present
  - name: Enabling remote connections to DB
    replace:
      path: /etc/mongod.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'
  - name: Enabling and restart services
    service:
      name: mongod
      state: started
      enabled: yes