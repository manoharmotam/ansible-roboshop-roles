---
# tasks file for redis
- name: Enabling the module
  command: dnf module enable redis:7 -y
- name: Installing Redis 7
  package: 
    name: redis
    state: present
- name: Allow remote connections on Redis
  replace:
    path: /etc/redis/redis.conf
    regexp: '127.0.0.1'
    replace: '0.0.0.0'
- name: Disabling the protected Mode
  lineinfile:
    path: /etc/redis/redis.conf
    regexp: "^protected-mode"
    line: "protected-mode no"
- name: Enabling and restart services
  service:
    name: redis
    state: started
    enabled: yes